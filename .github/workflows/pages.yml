# GitHub Pages: repo Ayarlar → Pages → Kaynak: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Vite 8: Node ^20.19 veya >=22.12; '22' tek başına bazen 22.11’e düşüp build’i kırıyordu
          node-version: '24'
          cache: npm
          cache-dependency-path: pdf-quiz/package-lock.json
      - name: Install and build
        working-directory: pdf-quiz
        env:
          # Proje sitesi: https://<kullanıcı>.github.io/<repo-adı>/
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: |
          node -v
          test -f package-lock.json || (echo 'package-lock.json eksik' && exit 1)
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pdf-quiz/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
